version: "3.9"

services:
  api:
    build: .
    command: uvicorn backend.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/app
    working_dir: /app

  worker:
    build: .
    command: python -m backend.worker.queue
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://mongo:27017
      - WORKER_COUNT=3
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/app
    working_dir: /app
    deploy:
      replicas: 1  # scale with: docker compose up --scale worker=5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=agentdb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  mongo_data:
